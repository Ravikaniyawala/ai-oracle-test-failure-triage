name: Oracle Triage (Reusable Workflow)

on:
  workflow_call:
    inputs:
      report-path:
        description: 'Directory containing test results (XML or JSON)'
        required: true
        type: string
      report-artifact-name:
        description: 'Name of the GitHub Actions artifact containing test results'
        required: true
        type: string
      report-format:
        description: 'Force format detection: PLAYWRIGHT_JSON | JUNIT_XML | PYTEST_JSON | auto'
        required: false
        type: string
        default: auto
      pipeline-id:
        description: 'Unique pipeline identifier — use github.run_id'
        required: false
        type: string
        default: 'unknown'
      dry-run:
        description: 'Skip Jira and Slack side effects (set to false to enable live integrations)'
        required: false
        type: boolean
        default: false
      triage-failure-mode:
        description: 'fail-closed (default, blocks pipeline on Oracle error) or pass-through (exits 0, informational only)'
        required: false
        type: string
        default: 'fail-closed'

    secrets:
      anthropic-api-key:
        required: true
      atlassian-token:
        required: false
      atlassian-email:
        description: 'Atlassian account email — required for Jira Basic Auth (e.g. you@your-org.com)'
        required: false
      atlassian-base-url:
        required: false
      atlassian-project-key:
        required: false
      slack-webhook-url:
        required: false

    outputs:
      verdict:
        description: 'CLEAR or BLOCKED'
        value: ${{ jobs.triage.outputs.verdict }}
      flaky-count:
        description: 'Number of FLAKY failures'
        value: ${{ jobs.triage.outputs.flaky-count }}
      regression-count:
        description: 'Number of REGRESSION failures'
        value: ${{ jobs.triage.outputs.regression-count }}
      new-bug-count:
        description: 'Number of NEW_BUG failures'
        value: ${{ jobs.triage.outputs.new-bug-count }}
      env-issue-count:
        description: 'Number of ENV_ISSUE failures'
        value: ${{ jobs.triage.outputs.env-issue-count }}

jobs:
  triage:
    name: Oracle Triage
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      pull-requests: write   # post PR comments
      contents: read         # checkout oracle repo

    outputs:
      verdict:           ${{ steps.verdict.outputs.verdict }}
      flaky-count:       ${{ steps.verdict.outputs.flaky-count }}
      regression-count:  ${{ steps.verdict.outputs.regression-count }}
      new-bug-count:     ${{ steps.verdict.outputs.new-bug-count }}
      env-issue-count:   ${{ steps.verdict.outputs.env-issue-count }}

    steps:
      - name: Checkout ai-oracle
        uses: actions/checkout@v4
        with:
          repository: Ravikaniyawala/ai-oracle-test-failure-triage
          ref: main
          path: oracle

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: oracle/package-lock.json

      - name: Install build tools for native modules
        run: sudo apt-get install -y python3 make g++

      - name: Install dependencies
        run: npm ci
        working-directory: oracle
        env:
          npm_config_cache: ${{ github.workspace }}/.npm-node24

      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.report-artifact-name }}
          path: downloaded-results/

      - name: Restore Oracle state cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .oracle-cache/oracle-state.db
            .oracle-cache/.instincts/
          key: oracle-state-${{ github.repository_id }}-${{ github.run_id }}
          restore-keys: oracle-state-${{ github.repository_id }}-

      - name: Prepare directories
        run: |
          mkdir -p .oracle-cache
          cp -r .oracle-cache/.instincts oracle/.instincts 2>/dev/null || mkdir -p oracle/.instincts

      - name: Generate PR context
        env:
          GH_TOKEN:    ${{ github.token }}
          PIPELINE_ID: ${{ inputs.pipeline-id }}
        run: |
          BRANCH="${{ github.ref_name }}"
          REPO="${{ github.repository }}"

          PR_DATA=$(gh pr view "$BRANCH" --repo "$REPO" \
            --json number,title,author,baseRefName,headRefName,files,body,commits 2>/dev/null || echo "")

          if [ -z "$PR_DATA" ]; then
            echo "[pr-context] no open PR found for branch $BRANCH — skipping enrichment"
            exit 0
          fi

          # Collect commit messages: try git log over the PR range first (requires
          # the calling repo to be checked out), fall back to API-provided commits.
          COMMIT_MSGS=$(git log origin/${{ github.base_ref }}..HEAD --pretty=format:%s 2>/dev/null || true)
          if [ -z "$COMMIT_MSGS" ]; then
            COMMIT_MSGS=$(echo "$PR_DATA" | jq -r '
              (.commits // []) | map((.messageHeadline // "") + "\n" + (.messageBody // "")) | join("\n")
            ' 2>/dev/null || true)
          fi

          # Combine title, body, branch name, and commit messages into one text blob.
          # grep extracts keys matching [A-Z][A-Z0-9]+-[0-9]+; sort -u deduplicates.
          JIRA_KEYS=$(
            {
              echo "$PR_DATA" | jq -r '.title // "", .body // "", .headRefName // ""'
              echo "$COMMIT_MSGS"
            } | grep -oE '[A-Z][A-Z0-9]+-[0-9]+' | sort -u || true
          )
          echo "[pr-context] Jira keys found: ${JIRA_KEYS:-none}"

          # Convert newline-separated keys into [{"key":"ABC-123"}, ...] JSON.
          LINKED_JIRA=$(printf '%s\n' "$JIRA_KEYS" \
            | jq -R -s -c 'split("\n") | map(select(length > 0)) | map({key: .})' || echo '[]')

          export LINKED_JIRA PIPELINE_ID
          echo "$PR_DATA" | node -e "
            const chunks = [];
            process.stdin.on('data', c => chunks.push(c));
            process.stdin.on('end', () => {
              const d = JSON.parse(chunks.join(''));
              const linkedJira = JSON.parse(process.env.LINKED_JIRA || '[]');
              const ctx = {
                pipelineId:   process.env.PIPELINE_ID,
                filesChanged: (d.files || []).map(f => f.path),
                linkedJira,
                prNumber:     d.number,
                title:        d.title,
                author:       typeof d.author === 'object' ? d.author.login : d.author,
                baseBranch:   d.baseRefName,
                headBranch:   d.headRefName,
              };
              require('fs').writeFileSync('oracle-pr-context.json', JSON.stringify(ctx, null, 2));
              console.log('[pr-context] wrote context for PR #' + d.number + ' — ' + ctx.filesChanged.length + ' file(s) changed, ' + linkedJira.length + ' Jira key(s)');
            });
          "
          echo "PR_CONTEXT_FILE=${{ github.workspace }}/oracle-pr-context.json" >> "$GITHUB_ENV"

      - name: Run Oracle triage
        env:
          ANTHROPIC_API_KEY:      ${{ secrets.anthropic-api-key }}
          ATLASSIAN_TOKEN:        ${{ secrets.atlassian-token }}
          ATLASSIAN_EMAIL:        ${{ secrets.atlassian-email }}
          ATLASSIAN_BASE_URL:     ${{ secrets.atlassian-base-url }}
          ATLASSIAN_PROJECT_KEY:  ${{ secrets.atlassian-project-key }}
          SLACK_WEBHOOK_URL:      ${{ secrets.slack-webhook-url }}
          DRY_RUN:                      ${{ inputs.dry-run && 'true' || 'false' }}
          ORACLE_TRIAGE_FAILURE_MODE:   ${{ inputs.triage-failure-mode }}
          PLAYWRIGHT_REPORT_PATH:       ${{ github.workspace }}/downloaded-results/
          REPORT_FORMAT:                ${{ inputs.report-format }}
          ORACLE_STATE_DB_PATH:         ${{ github.workspace }}/.oracle-cache/oracle-state.db
          ORACLE_PR_CONTEXT_PATH:       ${{ env.PR_CONTEXT_FILE }}
          CI_PIPELINE_ID:               ${{ inputs.pipeline-id }}
          GITHUB_TOKEN:                 ${{ github.token }}
          GITHUB_REF_NAME:              ${{ github.ref_name }}
          GITHUB_REPOSITORY:            ${{ github.repository }}
        run: npm run triage
        working-directory: oracle

      - name: Save updated instincts to cache dir
        if: always()
        run: cp -r oracle/.instincts .oracle-cache/.instincts 2>/dev/null || true

      - name: Save Oracle state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            .oracle-cache/oracle-state.db
            .oracle-cache/.instincts/
          key: oracle-state-${{ github.repository_id }}-${{ github.run_id }}

      - name: Determine verdict
        id: verdict
        if: always()
        run: |
          node -e "
            const fs = require('fs');
            const path = 'oracle/oracle-verdict.json';

            if (!fs.existsSync(path)) {
              console.log('[oracle] no verdict file found — defaulting to BLOCKED (safe fallback)');
              fs.appendFileSync(process.env.GITHUB_OUTPUT, 'verdict=BLOCKED\nflaky-count=0\nregression-count=0\nnew-bug-count=0\nenv-issue-count=0\n');
              process.exit(0);
            }

            const v = JSON.parse(fs.readFileSync(path, 'utf8'));
            const rawVerdict = v.verdict || 'BLOCKED';
            const flaky    = v.FLAKY      || 0;
            const reg      = v.REGRESSION || 0;
            const newBug   = v.NEW_BUG    || 0;
            const env      = v.ENV_ISSUE  || 0;

            // DEGRADED means Oracle itself failed (e.g. API error, parse failure).
            // In pass-through mode this should not block the downstream deploy gate,
            // so map DEGRADED → CLEAR.  In fail-closed mode (default) treat it as
            // BLOCKED to surface the problem.
            const failureMode = '${{ inputs.triage-failure-mode }}';
            const verdict = (rawVerdict === 'DEGRADED' && failureMode === 'pass-through')
              ? 'CLEAR'
              : rawVerdict === 'DEGRADED' ? 'BLOCKED' : rawVerdict;

            if (rawVerdict === 'DEGRADED') {
              console.log('[oracle] triage run was DEGRADED (Oracle error). reason:', v.reason || 'unknown');
              console.log('[oracle] failure-mode:', failureMode, '→ emitting verdict:', verdict);
            } else {
              console.log('[oracle] verdict:', verdict);
            }
            console.log('[oracle] FLAKY:', flaky, '| REGRESSION:', reg, '| NEW_BUG:', newBug, '| ENV_ISSUE:', env);

            fs.appendFileSync(process.env.GITHUB_OUTPUT, [
              'verdict='          + verdict,
              'flaky-count='      + flaky,
              'regression-count=' + reg,
              'new-bug-count='    + newBug,
              'env-issue-count='  + env,
            ].join('\n') + '\n');
          "

      - name: Upload Oracle state artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oracle-state
          path: .oracle-cache/oracle-state.db
          retention-days: 30
